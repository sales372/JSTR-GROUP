<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JSTR账本">
<meta name="theme-color" content="#0f0f14">
<title>JSTR 合伙账本</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f14; --bg2: #1a1a24; --bg3: #2a2a38;
    --accent: #c8b8f8; --green: #4ade80; --red: #f87171;
    --text: #e8e4dc; --muted: #888; --dim: #555; --border: #2a2a38;
  }
  body { background: var(--bg); color: var(--text); font-family: 'PingFang SC','Noto Sans SC',sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; overflow-x: hidden; }
  input, select, button { font-family: inherit; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); }
  .view { display: none; padding: 16px 20px 90px; animation: fadeIn 0.2s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .header { padding: 52px 20px 16px; background: linear-gradient(180deg,#1a1a24 0%,#0f0f14 100%); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header-sub { font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-bottom: 3px; }
  .header-title { font-size: 20px; font-weight: 700; color: #f0ebe0; }
  .fx-badge { font-size: 10px; color: var(--dim); margin-top: 6px; line-height: 1.8; }
  .balance-card { border-radius: 16px; padding: 20px 24px; margin-bottom: 14px; }
  .balance-card.positive { background: linear-gradient(135deg,#1e3a2f,#162b22); border: 1px solid #2d5a42; }
  .balance-card.negative { background: linear-gradient(135deg,#3a1e1e,#2b1616); border: 1px solid #5a2d2d; }
  .balance-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
  .balance-amount { font-size: 34px; font-weight: 800; margin-bottom: 4px; }
  .balance-amount.pos { color: var(--green); }
  .balance-amount.neg { color: var(--red); }
  .balance-desc { font-size: 12px; color: var(--muted); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--bg2); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
  .stat-name { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
  .stat-val { font-size: 17px; font-weight: 700; color: var(--accent); }
  .stat-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .section-label { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-bottom: 10px; margin-top: 4px; }
  .tx-row { background: var(--bg2); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; }
  .tx-row:active { border-color: var(--accent); }
  .tx-main { display: flex; justify-content: space-between; align-items: center; }
  .tx-left { flex: 1; min-width: 0; }
  .tx-tags { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .tag-jackie { background: #1e3358; color: #7bb3f8; }
  .tag-partner { background: #3a2a1a; color: #f0a060; }
  .tag-settle { background: #2a2a1e; color: var(--accent); }
  .tx-desc { font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .tx-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
  .tx-amount { font-weight: 700; font-size: 15px; }
  .tx-amount-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .tx-detail { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 12px; color: var(--dim); }
  .tx-detail-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .btn-delete { margin-top: 10px; padding: 6px 16px; border-radius: 8px; background: #3a1e1e; border: none; color: var(--red); font-size: 12px; cursor: pointer; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-bottom: 6px; }
  .input { width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; appearance: none; -webkit-appearance: none; }
  .input:focus { border-color: var(--accent); }
  .seg-group { display: flex; gap: 8px; }
  .seg-btn { flex: 1; padding: 9px 8px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .fx-hint { font-size: 11px; color: var(--dim); margin-top: 5px; }
  .amount-row { display: flex; gap: 8px; }
  .amount-row .input:first-child { flex: 1; }
  .amount-row select.input { width: 80px; flex: none; }
  .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #0f0f14; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 8px; }
  .settle-card { background: var(--bg2); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
  .settle-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .settle-divider { border-top: 1px solid var(--border); margin: 12px 0; }
  .settle-total { display: flex; justify-content: space-between; }
  .btn-settle { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg,#4ade80,#22c55e); color: #0f0f14; font-weight: 700; font-size: 15px; cursor: pointer; }
  .empty { text-align: center; color: var(--dim); padding: 40px 0; font-size: 13px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .filter-row select.input { flex: 1; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 6px 0 max(16px,env(safe-area-inset-bottom)); z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; }
  .nav-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .nav-icon.active { background: var(--bg3); }
  .nav-icon.primary { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg,#c8b8f8,#a78bfa); color: #0f0f14; font-size: 26px; font-weight: 300; margin-top: -14px; }
  .nav-label { font-size: 10px; color: var(--dim); }
  .nav-label.active { color: var(--accent); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px max(24px,env(safe-area-inset-bottom)); width: 100%; max-width: 480px; margin: 0 auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-cancel { background: var(--bg3); color: var(--muted); }
  .modal-ok { background: var(--green); color: #0f0f14; }
</style>
</head>
<body>
<div class="header">
  <div class="header-sub">JSTR GROUP · 进口账本</div>
  <div class="header-title">合伙记账</div>
  <div class="fx-badge" id="fx-badge">正在获取实时汇率…</div>
</div>
<div class="view active" id="view-dashboard">
  <div class="balance-card positive" id="balance-card">
    <div class="balance-label">当前垫付差额 (AUD)</div>
    <div class="balance-amount pos" id="balance-amount">A$0.00</div>
    <div class="balance-desc" id="balance-desc">暂无差额</div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-name">我 (Jackie)</div><div class="stat-val" id="stat-jackie">A$0.00</div><div class="stat-sub">累计垫付</div></div>
    <div class="stat-card"><div class="stat-name">合伙人 (China)</div><div class="stat-val" id="stat-partner">A$0.00</div><div class="stat-sub">累计垫付</div></div>
  </div>
  <div class="section-label">最近记录</div>
  <div id="recent-list"><div class="empty">还没有记录，点下方 + 开始记账</div></div>
</div>
<div class="view" id="view-add">
  <div style="font-size:16px;font-weight:700;margin-bottom:20px;color:var(--accent)">新建记录</div>
  <div class="form-row"><div class="form-label">类型</div><div class="seg-group"><button class="seg-btn" id="type-expense" onclick="setType('expense')" style="background:var(--accent);color:#0f0f14">支出 / 垫付</button><button class="seg-btn" id="type-income" onclick="setType('income')" style="background:var(--bg3);color:var(--muted)">收入</button></div></div>
  <div class="form-row"><div class="form-label">日期</div><input class="input" type="date" id="f-date"></div>
  <div class="form-row"><div class="form-label">描述</div><input class="input" type="text" id="f-desc" placeholder="如：采购A批货款"></div>
  <div class="form-row"><div class="form-label">金额</div><div class="amount-row"><input class="input" type="number" id="f-amount" placeholder="0.00" inputmode="decimal" oninput="updateFx()"><select class="input" id="f-currency" onchange="updateFx()"><option>AUD</option><option>CNY</option><option>USD</option></select></div><div class="fx-hint" id="fx-hint"></div></div>
  <div class="form-row"><div class="form-label">谁垫付</div><div class="seg-group"><button class="seg-btn" id="paid-jackie" onclick="setPaid('我 (Jackie)')" style="background:var(--green);color:#0f0f14">我 (Jackie)</button><button class="seg-btn" id="paid-partner" onclick="setPaid('合伙人 (China)')" style="background:var(--bg3);color:var(--muted)">合伙人</button></div></div>
  <div class="form-row"><div class="form-label">分类</div><select class="input" id="f-category"><option>采购货款</option><option>运费/物流</option><option>关税/清关</option><option>仓储</option><option>平台费用</option><option>营销推广</option><option>工资/劳务</option><option>办公杂费</option><option>其他支出</option><option>收入</option></select></div>
  <div class="form-row"><div class="form-label">账户 / 钱包</div><select class="input" id="f-account"><option>ANZ</option><option>支付宝</option><option>微信</option><option>现金AUD</option><option>现金CNY</option><option>其他</option></select></div>
  <div class="form-row"><div class="form-label">备注（可选）</div><input class="input" type="text" id="f-note" placeholder="备注信息"></div>
  <button class="btn-primary" onclick="submitTx()">保存记录</button>
</div>
<div class="view" id="view-history">
  <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)">全部记录</div>
  <div class="filter-row"><select class="input" id="filter-who" onchange="renderHistory()"><option value="全部">全部人员</option><option value="我 (Jackie)">我 (Jackie)</option><option value="合伙人 (China)">合伙人 (China)</option></select><select class="input" id="filter-cat" onchange="renderHistory()"><option value="全部">全部分类</option><option>采购货款</option><option>运费/物流</option><option>关税/清关</option><option>仓储</option><option>平台费用</option><option>营销推广</option><option>工资/劳务</option><option>办公杂费</option><option>其他支出</option><option>收入</option></select></div>
  <div id="history-list"></div>
</div>
<div class="view" id="view-settle">
  <div style="font-size:16px;font-weight:700;margin-bottom:20px;color:var(--accent)">结算中心</div>
  <div class="settle-card" id="settle-breakdown"></div>
  <div class="settle-card" id="settle-currency"></div>
  <button class="btn-settle" id="btn-settle" onclick="openSettleModal()">✓ 标记结算完成</button>
</div>
